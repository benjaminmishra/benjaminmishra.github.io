name: Deploy Site

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_infra:
        description: Run Pulumi before Cloudflare deployment
        required: true
        default: false
        type: boolean
      pulumi_stack:
        description: Pulumi stack name to use when infra is enabled
        required: false
        default: production
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Build site
        run: ./scripts/build-site.sh

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: build
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      PROVIDER: cloudflare
      DEPLOY_BRANCH: ${{ github.ref_name }}
      BUILD_DIR: build
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      PULUMI_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download static artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Run infrastructure
        if: github.event_name == 'workflow_dispatch' && inputs.run_infra
        run: ./scripts/infra.sh up "${PROVIDER}" "${{ inputs.pulumi_stack }}"

      - name: Deploy site
        run: ./scripts/deploy.sh "${PROVIDER}"
